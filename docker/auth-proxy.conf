# Nginx shim: supabase-js hardcodes /auth/v1 as the path prefix for all auth
# endpoints, while GoTrue serves its routes at /. This proxy strips the prefix
# so supabase-js (which calls {SUPABASE_URL}/auth/v1/token etc.) reaches the
# correct GoTrue routes ({SUPABASE_URL}/token etc.), matching what hosted
# Supabase's Kong gateway does in production.
#
# Port 54321 matches the supabase convention already present in
# frontend/.env.local's NEXT_PUBLIC_SUPABASE_URL.
#
# The upstream host is resolved at request time (via Docker's embedded DNS at
# 127.0.0.11) rather than at nginx startup: a static `upstream` block or a
# bare `proxy_pass http://auth:9999` resolves `auth` once at config load and
# emerg-exits if the auth container isn't on the network yet (it fatal-exits
# on a config mistake and restarts, racing the proxy). Using a `set` variable
# + `resolver` defers resolution to request time, so the proxy stays up and
# routes the moment auth becomes reachable.

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    # CORS: nginx is the single CORS authority for every auth request.
    # The origin is validated against the same regex the backend uses
    # (app/main.py _ALLOWED_ORIGIN_REGEX).  A matching origin is reflected
    # back so any tenant subdomain works without a static allow-list or a
    # GoTrue restart.  If $http_origin is absent (curl, server-to-server)
    # or doesn't match, $cors_origin stays empty and no CORS header is sent
    # -- the browser enforces the block per the CORS spec.
    #
    # GoTrue's own CORS middleware is deliberately suppressed via
    # proxy_hide_header; otherwise there would be two conflicting
    # Access-Control-Allow-Origin headers with different values.
    location /auth/v1/ {
        set $gotrue http://auth:9999;

        set $cors_origin "";
        if ($http_origin ~* "^https?://([a-z0-9-]+\.)?(localhost|wren\.app)(:\d+)?$") {
            set $cors_origin $http_origin;
        }

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$cors_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'content-type, apikey, authorization, x-client-info, x-supabase-api-version' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        # Suppress any CORS header GoTrue emits to avoid duplicates, then
        # add the single correct one on every response -- including 502/504
        # errors from a crashed upstream -- so the browser never reports a
        # confusing "CORS error" for what is really a backend failure.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        add_header 'Access-Control-Allow-Origin' '$cors_origin' always;

        rewrite ^/auth/v1/(.*)$ /$1 break;
        proxy_pass $gotrue;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    # Health check passthrough.
    location = /health {
        set $gotrue http://auth:9999;
        proxy_pass $gotrue/health;
        proxy_set_header Host $host;
    }
}
